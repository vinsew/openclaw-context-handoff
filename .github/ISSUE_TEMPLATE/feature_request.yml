name: Feature request
description: Suggest an improvement for the plugin
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What behavior should change?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Include examples, edge cases, or constraints if relevant.
